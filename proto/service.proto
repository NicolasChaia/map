syntax = "proto3";

package proto;

option go_package = "Desktop/mr/proto;pb";

enum TaskType {
  TASK_TYPE_UNSPECIFIED = 0;
  TASK_TYPE_MAP = 1;
  TASK_TYPE_REDUCE = 2;
  TASK_TYPE_WAIT = 3;
  TASK_TYPE_EXIT = 4;
}

enum FileStatus {
  FILE_STATUS_UNSPECIFIED = 0;
  FILE_STATUS_NOT_PROCESSED = 1;
  FILE_STATUS_IN_PROGRESS = 2;
  FILE_STATUS_PROCESSED = 3;
}

message KeyValue {
  string key = 1;
  int32 value = 2;
}

message GetTaskRequest {
  string worker_id = 1;
}

message GetTaskResponse {
  TaskType task_type = 1;
  string input_path = 2;
  int32 reduce_index = 3;
  int32 n_reduce = 4;
  repeated string reduce_paths = 5;
}

message ReportMapDoneRequest {
  string worker_id = 1;
  string input_path = 2;
  repeated string reduce_paths = 3;
}

message ReportReduceDoneRequest {
  string worker_id = 1;
  int32 reduce_index = 2;
  string output_path = 3;
}

message Ack {
  bool ok = 1;
  string message = 2;
}

message JobStatusRequest {}

message JobStatusResponse {
  bool done = 1;
  int32 map_total = 2;
  int32 map_completed = 3;
  int32 reduce_total = 4;
  int32 reduce_completed = 5;
}

service CoordinatorService {
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse);
  rpc ReportMapDone(ReportMapDoneRequest) returns (Ack);
  rpc ReportReduceDone(ReportReduceDoneRequest) returns (Ack);
  rpc JobStatus(JobStatusRequest) returns (JobStatusResponse);
}
